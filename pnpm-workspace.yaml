packages:
  - apps/*
  - apps/*/*
  - e2e/fixtures/*
  - packages/*

allowBuilds:
  "@mongodb-js/zstd": true
  "@nestjs/core": true
  "@parcel/watcher": false
  cbor-extract: true
  esbuild: true
  node-liblzma: false
  phase: false
  protobufjs: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: false
  webgpu: true

catalog:
  "@ai-sdk/anthropic": "^4.0.0"
  "@ai-sdk/google": "^4.0.0"
  "@ai-sdk/mcp": "^2.0.1"
  "@ai-sdk/openai": "^4.0.0"
  "@ai-sdk/otel": "^1.0.0"
  "@ai-sdk/provider": "^4.0.0"
  "@ai-sdk/provider-utils": "^5.0.0"
  "@types/node": "25.9.1"
  "@types/react": "19.2.15"
  "@types/react-dom": "19.2.3"
  "@vercel/connect": "0.2.2"
  "@vercel/sandbox": "2.3.0"
  ai: "^7.0.0"
  next: "16.2.6"
  phase: "0.0.1"
  picocolors: "1.1.1"
  react: "19.2.6"
  react-dom: "19.2.6"
  streamdown: "2.5.0"
  typescript: "7.0.2"
  vitest: "4.1.7"
  zod: "4.4.3"

minimumReleaseAge: 2880 # 2 days

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@rolldown/*"
  - "@typescript/typescript-*"
  - "@turbo/*"
  - "@workflow/*"
  - "@vercel/*"
  - "@vgpu/*"
  - ai
  - crossws
  - experimental-ai-sdk-code-mode
  - eve
  - nitro
  - rolldown
  - turbo
  - typescript
  - vercel
  - workflow
  - phase@0.0.1
